<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <meta name="description" content="Build and preserve your family history with an intuitive family tree builder">
    <meta name="author" content="My Family Tree" />
    
    <!-- Set language and direction immediately from localStorage to prevent flash -->
    <script>
      (function() {
        const savedLang = localStorage.getItem('preferred-language') || 'ar';
        const dir = savedLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = savedLang;
        document.documentElement.dir = dir;
      })();
    </script>
